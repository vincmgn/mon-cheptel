name: Build and Deploy

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['develop']

# Annuler les builds en cours si nouveau push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run prettier, linter & typecheck (parallel)
        run: yarn format:check & yarn lint & yarn typecheck & wait

  build:
    if: github.event_name == 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract package version
        id: app_version
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v${{ steps.app_version.outputs.version }},enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Redeploy Portainer stack with updated compose
        run: |
          set -euo pipefail

          DIRECT_URL="${{ secrets.DOCKER_PORTAINER_DIRECT_URL }}"
          PUBLIC_URL="${{ secrets.DOCKER_PORTAINER_URL }}"

          DIRECT_URL="${DIRECT_URL%/}"
          PUBLIC_URL="${PUBLIC_URL%/}"

          COMPOSE_PATH="$GITHUB_WORKSPACE/docker-compose.prod.yml"
          if [ ! -f "$COMPOSE_PATH" ]; then
            echo "Fichier compose introuvable: $COMPOSE_PATH"
            pwd
            ls -la
            exit 1
          fi

          CURL_BASE=(--silent --show-error --fail --connect-timeout 10 --max-time 30 --retry 1 --retry-delay 2)

          resolve_portainer() {
            local candidate="$1"
            if [ -z "$candidate" ]; then
              return 1
            fi

            local jwt
            jwt=$(curl "${CURL_BASE[@]}" -X POST "$candidate/api/auth" \
              -H "Content-Type: application/json" \
              -d "{\"username\": \"${{ secrets.DOCKER_PORTAINER_USER }}\", \"password\": \"${{ secrets.DOCKER_PORTAINER_PASSWORD }}\"}" | jq -r .jwt || true)

            if [ -n "$jwt" ] && [ "$jwt" != "null" ]; then
              echo "$candidate|$jwt"
              return 0
            fi

            return 1
          }

          PORTAINER_AUTH=""
          if PORTAINER_AUTH=$(resolve_portainer "$DIRECT_URL"); then
            echo "Portainer direct reachable"
          elif PORTAINER_AUTH=$(resolve_portainer "$PUBLIC_URL"); then
            echo "Portainer public URL reachable"
          else
            echo "Impossible de joindre Portainer (direct + public)"
            exit 1
          fi

          PORTAINER_URL="${PORTAINER_AUTH%%|*}"
          JWT="${PORTAINER_AUTH#*|}"

          STACKS_JSON=$(curl "${CURL_BASE[@]}" -H "Authorization: Bearer $JWT" "$PORTAINER_URL/api/stacks")
          STACK_ID=$(echo "$STACKS_JSON" | jq -r '.[] | select(.Name == "${{ secrets.PORTAINER_STACK_NAME }}") | .Id' | head -n 1)
          ENDPOINT_ID=$(echo "$STACKS_JSON" | jq -r '.[] | select(.Name == "${{ secrets.PORTAINER_STACK_NAME }}") | .EndpointId' | head -n 1)

          if [ -z "$STACK_ID" ] || [ "$STACK_ID" = "null" ]; then
            echo "Stack introuvable: ${{ secrets.PORTAINER_STACK_NAME }}"
            echo "Stacks disponibles:"
            echo "$STACKS_JSON" | jq -r '.[].Name'
            exit 1
          fi

          if [ -z "$ENDPOINT_ID" ] || [ "$ENDPOINT_ID" = "null" ]; then
            echo "EndpointId introuvable pour la stack $STACK_ID"
            exit 1
          fi

          STACK_FILE_CONTENT=$(jq -Rs . < "$COMPOSE_PATH")

          DATABASE_URL="postgresql://user_prod:password_prod@db:5432/cheptel_db"
          ENV_VARS=$(jq -n \
            --arg db_url "$DATABASE_URL" \
            --arg nuxt_secret "${{ secrets.NUXT_SECRET }}" \
            --arg nuxt_session_password "${{ secrets.NUXT_SESSION_PASSWORD }}" \
            '[{name: "DATABASE_URL", value: $db_url}, {name: "NUXT_SECRET", value: $nuxt_secret}, {name: "NUXT_SESSION_PASSWORD", value: $nuxt_session_password}]')

          echo "Updating stack $STACK_ID (endpointId=$ENDPOINT_ID)..."
          HTTP_RESPONSE=$(curl --silent --show-error -w "\n%{http_code}" -X PUT "$PORTAINER_URL/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"stackFileContent\": $STACK_FILE_CONTENT, \"env\": $ENV_VARS, \"prune\": true, \"pullImage\": true}")
          CURL_EXIT_CODE=$?
          set -e

          if [ "$CURL_EXIT_CODE" -ne 0 ]; then
            echo "Erreur réseau Portainer (curl=$CURL_EXIT_CODE). Vérifie l'accès runner -> $PORTAINER_URL"
            exit "$CURL_EXIT_CODE"
          fi

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1)

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Error updating stack (HTTP $HTTP_STATUS):"
            echo "$HTTP_BODY"
            exit 1
          fi

          echo "Stack update initiated successfully"
