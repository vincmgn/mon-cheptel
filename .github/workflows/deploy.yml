name: Build and Deploy

on:
  push:
    branches: ['main']

# Annuler les builds en cours si nouveau push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run prettier, linter & typecheck (parallel)
        run: yarn format:check & yarn lint & yarn typecheck & wait

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Redeploy Portainer stack with updated compose
        run: |
          set -euo pipefail

          PORTAINER_URL="${{ secrets.DOCKER_PORTAINER_DIRECT_URL }}"
          PORTAINER_URL="${PORTAINER_URL%/}"

          if [ -z "$PORTAINER_URL" ]; then
            echo "DOCKER_PORTAINER_DIRECT_URL est vide"
            exit 1
          fi

          CURL_BASE=(--silent --show-error --fail --connect-timeout 10 --max-time 30 --retry 2 --retry-delay 2 --retry-connrefused)
          # 1. Obtenir le JWT de Portainer (fail fast en cas d'erreur)
          # DOCKER_PORTAINER_DIRECT_URL = URL directe (IP:port) sans Cloudflare, évite les timeouts 524
          JWT=$(curl "${CURL_BASE[@]}" -X POST "$PORTAINER_URL/api/auth" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"${{ secrets.DOCKER_PORTAINER_USER }}\", \"password\": \"${{ secrets.DOCKER_PORTAINER_PASSWORD }}\"}" | jq -r .jwt)

          if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then
            echo "Impossible d'obtenir le JWT Portainer"
            exit 1
          fi

          # 2. Récupérer l'ID de la stack
          STACKS_JSON=$(curl "${CURL_BASE[@]}" -H "Authorization: Bearer $JWT" "$PORTAINER_URL/api/stacks")
          STACK_ID=$(echo "$STACKS_JSON" | jq -r '.[] | select(.Name == "${{ secrets.PORTAINER_STACK_NAME }}") | .Id' | head -n 1)
          ENDPOINT_ID=$(echo "$STACKS_JSON" | jq -r '.[] | select(.Name == "${{ secrets.PORTAINER_STACK_NAME }}") | .EndpointId' | head -n 1)

          if [ -z "$STACK_ID" ] || [ "$STACK_ID" = "null" ]; then
            echo "Stack introuvable: ${{ secrets.PORTAINER_STACK_NAME }}"
            echo "Stacks disponibles:"
            echo "$STACKS_JSON" | jq -r '.[].Name'
            exit 1
          fi

          if [ -z "$ENDPOINT_ID" ] || [ "$ENDPOINT_ID" = "null" ]; then
            echo "EndpointId introuvable pour la stack $STACK_ID"
            exit 1
          fi

          # 3. Lire le contenu du docker-compose, remplacer le tag :latest par le SHA
          #    (le tag SHA est unique par commit → Docker le pullera automatiquement
          #    au redémarrage du container, sans bloquer la requête Portainer)
          SHA_TAG="sha-$(echo "$GITHUB_SHA" | cut -c1-7)"
          STACK_FILE_CONTENT=$(sed "s/:latest/:$SHA_TAG/g" docker-compose.prod.yml | jq -Rs .)

          # 4. Préparer les variables d'environnement
          # La DATABASE_URL doit utiliser 'db' comme hostname (nom du service dans docker-compose)
          DATABASE_URL="postgresql://user_prod:password_prod@db:5432/cheptel_db"
          ENV_VARS=$(jq -n \
            --arg db_url "$DATABASE_URL" \
            --arg nuxt_secret "${{ secrets.NUXT_SECRET }}" \
            --arg nuxt_session_password "${{ secrets.NUXT_SESSION_PASSWORD }}" \
            '[{name: "DATABASE_URL", value: $db_url}, {name: "NUXT_SECRET", value: $nuxt_secret}, {name: "NUXT_SESSION_PASSWORD", value: $nuxt_session_password}]')

          # 5. Mettre à jour la stack via l'endpoint d'update (avec redeploy)
          echo "Updating stack $STACK_ID (endpointId=$ENDPOINT_ID)..."
          # On capture le code HTTP et le corps de réponse
          # NOTE: On utilise PUT /api/stacks/{id} au lieu de POST /api/stacks/{id}/update qui n'existe plus/pas
          set +e
          HTTP_RESPONSE=$(curl --silent --show-error --connect-timeout 10 --max-time 180 --retry 1 -w "\n%{http_code}" -X PUT "$PORTAINER_URL/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"stackFileContent\": $STACK_FILE_CONTENT, \"env\": $ENV_VARS, \"prune\": true, \"pullImage\": false}")
          CURL_EXIT_CODE=$?
          set -e

          if [ "$CURL_EXIT_CODE" -ne 0 ]; then
            echo "Erreur réseau Portainer (curl=$CURL_EXIT_CODE). Vérifie l'accès runner -> $PORTAINER_URL"
            exit "$CURL_EXIT_CODE"
          fi

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1)

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Error updating stack (HTTP $HTTP_STATUS):"
            echo "$HTTP_BODY"
            exit 1
          else
            echo "Stack update initiated successfully:"
            echo "$HTTP_BODY"
          fi
