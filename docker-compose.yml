services:
  db:
    image: postgres:15-alpine
    container_name: cheptel_db_dev
    restart: always
    environment:
      POSTGRES_USER: cheptel_admin
      POSTGRES_PASSWORD: cheptel_password
      POSTGRES_DB: cheptel_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
